name: product-smoke

on:
  push:
    branches: [main]
    paths:
      - "vmbench_cli.py"
      - "vmbench_product_surface.py"
      - "vmbench_demo_runtime.py"
      - "reference_vm.py"
      - "dataset_pipeline.py"
      - "candidate_generator.py"
      - "branch_ranker.py"
      - "learned_branch_ranker.py"
      - "search_runner.py"
      - "vm_transition_verifier.py"
      - "curriculum_gate.py"
      - "baseline_trainer.py"
      - "sft_export.py"
      - "tools/mcp/**"
      - ".github/workflows/product-smoke.yml"
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Smoke CLI repo-map
        run: python vmbench_cli.py repo-map

      - name: Smoke CLI status
        run: python vmbench_cli.py status

      - name: Prepare compare fixtures
        run: |
          mkdir -p .ci-smoke
          cat > .ci-smoke/base_summary.json <<'EOF'
          {
            "model": "base-model",
            "stages": {
              "single_step": {
                "test_exact_match_rate": 0.1,
                "test_repaired_exact_match_rate": 0.2,
                "test_avg_field_accuracy": 0.3,
                "val_exact_match_rate": 0.1,
                "val_repaired_exact_match_rate": 0.2,
                "val_avg_field_accuracy": 0.3
              }
            }
          }
          EOF
          cat > .ci-smoke/candidate_summary.json <<'EOF'
          {
            "model": "candidate-model",
            "stages": {
              "single_step": {
                "test_exact_match_rate": 0.15,
                "test_repaired_exact_match_rate": 0.25,
                "test_avg_field_accuracy": 0.35,
                "val_exact_match_rate": 0.12,
                "val_repaired_exact_match_rate": 0.22,
                "val_avg_field_accuracy": 0.31
              }
            }
          }
          EOF

      - name: Smoke CLI compare
        run: |
          python vmbench_cli.py compare \
            --base-summary .ci-smoke/base_summary.json \
            --candidate-summary .ci-smoke/candidate_summary.json

      - name: Smoke dataset generation
        run: |
          python vmbench_cli.py generate \
            --output-dir /tmp/vmbench_smoke \
            --single-step-limit 4 \
            --next-2-steps-limit 2 \
            --short-trace-limit 2 \
            --terminal-state-limit 2

      - name: Smoke SFT export
        run: |
          python vmbench_cli.py export-sft \
            --dataset-root /tmp/vmbench_smoke \
            --output-dir /tmp/vmbench_sft \
            --stages single_step

      - name: Install MCP SDK
        run: python -m pip install --upgrade pip mcp==1.26.0

      - name: Smoke vmbench MCP function surface
        run: |
          python - <<'PY'
          from tools.mcp.vmbench_mcp_server import (
              vmbench_compare_reports,
              vmbench_export_sft,
              vmbench_gate_summary,
              vmbench_generate_dataset,
          )

          generated = vmbench_generate_dataset(
              output_dir="datasets/mcp_ci_smoke",
              single_step_limit=4,
              next_2_steps_limit=2,
              short_trace_limit=2,
              terminal_state_limit=2,
              seed=7,
          )
          assert generated["status"] == "success", generated

          exported = vmbench_export_sft(
              dataset_root="datasets/mvp",
              output_dir="training_data/mcp_ci_sft_smoke",
              stages=["single_step"],
          )
          assert exported["status"] == "success", exported

          gated = vmbench_gate_summary(summary_path=".ci-smoke/base_summary.json")
          assert gated["status"] == "success", gated

          compared = vmbench_compare_reports(
              ".ci-smoke/base_summary.json",
              ".ci-smoke/candidate_summary.json",
          )
          assert compared["status"] == "success", compared
          PY

      - name: Smoke vmbench MCP server
        run: python tools/mcp/vmbench_mcp_server.py --self-test
